[build]
  publish = "."
  functions = "netlify/functions"

# Firebase client-side API keys are intentionally public — they are not secrets.
# They are scoped and secured entirely by Firebase/Firestore security rules.
# See: https://firebase.google.com/docs/projects/api-keys
[build.environment]
  SECRETS_SCAN_SMART_DETECTION_OMIT_VALUES = "AIzaSyDMr6LTZYM4Jhp50DV4wCyOeEY1bcDJjIY"

[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "SAMEORIGIN"
    X-Content-Type-Options = "nosniff"
